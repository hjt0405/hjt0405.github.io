<!doctype html> <!-- timetable.html -->
<html>
<head>

	<title>HOngSnail</title>
	<style>
		header, nav {border:1px solid gray; margin:5px; padding:8px; width:1800;}

		 aside{border:1px solid gray; margin:5px; padding:8px; width:50px; float:left; line-height:30px;}
		 footer{border:1px solid gray; margin:5px; padding:8px; sheight:50px; clear:both;}
		 nav ul{margin:0; padding:0;}
		 nav ul li{display:inline; margin:5px;}
		 aside ul{margin:0; padding:0;}
		 aside ul li{display:block; margin:5px;}

		table, thead, tbody, th, tr, td {

<body>
