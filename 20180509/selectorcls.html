<!doctype html>  <!--   selectorcls.html-->
<html>
 <head>
  <meta charset="utf-8"/>
   <title> 선택자 class 실습 </title>
   <style>
    .bu {color:blue; }
    p.rd {color:red; } <!-- p태그 중에서 클래스가 rd인 것>
   </style>
 </head>
 <body>
  <h1 class="bu">애국가</h1> 
  <p class="rd">동해물과 백두산이</p>
  <p class="bu">마르고 닳도록</p>  
 </body>
</html>
